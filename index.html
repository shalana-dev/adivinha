<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adivinhe o numero</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="jogo">
      <h1>Adivinhe o numero!</h1>
      <p>Pensei em um numero de 1 a 100. Consegue acertar?</p>

      <form id="form">
        <input
          id="palpite"
          type="number"
          min="1"
          max="100"
          placeholder="Seu palpite"
          required
        />
        <button type="submit">Tentar</button>
      </form>

      <p id="dica"></p>
      <p id="tentativas">Tentativas: 0</p>

      <button id="reiniciar" class="escondido">Jogar de novo</button>
    </main>

    <script src="script.js"></script>
  </body>
</html>
